global
    maxconn 100
    log stdout format raw local0

defaults
    log global
    mode tcp
    retries 2
    timeout client 30m
    timeout connect 4s
    timeout server 30m
    timeout check 5s

# Stats interface for monitoring
listen stats
    mode http
    bind *:7000
    stats enable
    stats uri /
    stats refresh 5s
    stats show-legends
    stats auth admin:admin

# Primary PostgreSQL - Write operations
listen postgres-primary
    bind *:5000
    option httpchk
    http-check expect status 200
    default-server inter 3s fall 3 rise 2 on-marked-down shutdown-sessions
    server postgres-primary postgres-primary:5432 maxconn 100 check port 5432
    server postgres-replica1 postgres-replica1:5432 maxconn 100 check port 5432 backup
    server postgres-replica2 postgres-replica2:5432 maxconn 100 check port 5432 backup

# Read Replicas - Read-only operations load balanced
listen postgres-replicas
    bind *:5001
    balance roundrobin
    option httpchk
    http-check expect status 200
    default-server inter 3s fall 3 rise 2
    server postgres-replica1 postgres-replica1:5432 maxconn 100 check port 5432
    server postgres-replica2 postgres-replica2:5432 maxconn 100 check port 5432
    server postgres-primary postgres-primary:5432 maxconn 100 check port 5432 backup

# For Patroni-based setup, use REST API health checks:
# http-check send meth GET uri /health
# http-check expect status 200
# server patroni1 postgres-primary:8008 check port 8008
