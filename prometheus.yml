global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: 'dfs-monitor'

scrape_configs:
  # FastAPI Application Metrics
  - job_name: 'fastapi-dfs'
    static_configs:
      - targets: ['fastapi:8000']
        labels:
          service: 'distributed-file-storage'
          environment: 'production'
    metrics_path: '/metrics'
    scrape_interval: 10s

  # MinIO Metrics (if MinIO exposes Prometheus metrics)
  - job_name: 'minio-cluster'
    static_configs:
      - targets: ['minio1:9000', 'minio2:9000', 'minio3:9000']
        labels:
          service: 'minio'
          cluster: 'dfs-storage'
    metrics_path: '/minio/v2/metrics/cluster'
    scrape_interval: 30s

  # PostgreSQL Metrics (requires postgres_exporter)
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']
        labels:
          service: 'postgresql'
          database: 'dfs'
    scrape_interval: 30s

  # Redis Metrics (requires redis_exporter)
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']
        labels:
          service: 'redis'
          cache: 'dfs'
    scrape_interval: 30s

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
        labels:
          service: 'prometheus'
