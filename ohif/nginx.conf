# Ensure .mjs files are served as JavaScript so browsers allow ES module imports.
# The default nginx mime.types does not include .mjs, causing a MIME block error
# for OHIF's Workbox service-worker bundle.
include /etc/nginx/mime.types;

types {
    application/javascript  mjs;
}

server {
    listen 80;
    server_name _;

    # Re-resolve Docker service DNS so upstream survives container IP changes.
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $dicomweb_upstream http://fastapi:8000;

    root /usr/share/nginx/html;
    index index.html;

    location = /app-config.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;
        expires -1;
    }

    # ConnectedStandaloneRouting in this OHIF build expects ?url=...
    # This endpoint returns per-request JSON config with tokenized local DICOM roots.
    location = /ohif-config {
        default_type application/json;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;
        expires -1;

        if ($arg_token = "") {
            return 400 '{"error":"token query parameter is required"}';
        }

        return 200 '{"studyInstanceUIDs":"$arg_studyInstanceUIDs","StudyInstanceUIDs":"$arg_studyInstanceUIDs","seriesInstanceUIDs":"$arg_seriesInstanceUIDs","SeriesInstanceUIDs":"$arg_seriesInstanceUIDs","initialSeriesInstanceUID":"$arg_seriesInstanceUIDs","servers":{"dicomWeb":[{"name":"MedImage Local DICOMweb","qidoRoot":"/dicomweb-token/$arg_token","wadoRoot":"/dicomweb-token/$arg_token","wadoUriRoot":"/dicomweb-token/$arg_token/wado","qidoSupportsIncludeField":true,"imageRendering":"wadouri","thumbnailRendering":"wadouri","enableStudyLazyLoad":true,"supportsFuzzyMatching":false}]}}';
    }

    # Proxy DICOMweb requests and inject JWT from URL token segment.
    location ~ ^/dicomweb-token/([^/]+)(/.*)$ {
        proxy_pass $dicomweb_upstream/dicomweb$2$is_args$args;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization "Bearer $1";
    }

    # Optional direct pass-through if Authorization header is present.
    location /dicomweb/ {
        proxy_pass $dicomweb_upstream/dicomweb/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization $http_authorization;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
