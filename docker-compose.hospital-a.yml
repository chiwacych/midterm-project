version: '3.8'

# Hospital A - Complete Independent System
# Deployed to Multipass VM (hospital-a) via scripts/deploy-hospital-a.ps1
# Network isolation is handled at the VM level — no custom Docker networks needed

services:
  # PostgreSQL Primary Database
  postgres:
    image: postgres:15
    container_name: hospital-a-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: medimage
      POSTGRES_PASSWORD: medimage123
      POSTGRES_DB: medimage_db
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medimage"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: hospital-a-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO Object Storage (3-node cluster)
  minio1:
    image: minio/minio:latest
    container_name: hospital-a-minio1
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - minio1-data:/data
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  minio2:
    image: minio/minio:latest
    container_name: hospital-a-minio2
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - minio2-data:/data
    command: server /data --console-address ":9002"
    ports:
      - "9010:9000"
      - "9002:9002"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  minio3:
    image: minio/minio:latest
    container_name: hospital-a-minio3
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    volumes:
      - minio3-data:/data
    command: server /data --console-address ":9003"
    ports:
      - "9020:9000"
      - "9003:9003"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # Kafka for event streaming
  zookeeper:
    image: confluentinc/cp-zookeeper:latest
    container_name: hospital-a-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:latest
    container_name: hospital-a-kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  # Federation gRPC Service
  federation:
    build: ./federation
    container_name: hospital-a-federation
    restart: unless-stopped
    environment:
      - FEDERATION_GRPC_PORT=50051
      - HOSPITAL_ID=hospital-a
      - HOSPITAL_NAME=Hospital A
      - MINIO1_ENDPOINT=minio1:9000
      - MINIO2_ENDPOINT=minio2:9000
      - MINIO3_ENDPOINT=minio3:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin123
      - MINIO_BUCKET=hospital-a-files
      - FEDERATION_PEER_HOSPITAL_B=172.29.138.58:50051
    ports:
      - "50051:50051"
    depends_on:
      - minio1
      - minio2
      - minio3

  # FastAPI Backend
  fastapi:
    build: ./app
    container_name: hospital-a-api
    restart: unless-stopped
    environment:
      - HOSPITAL_ID=hospital-a
      - HOSPITAL_NAME=Hospital A
      - DATABASE_URL=postgresql://medimage:medimage123@postgres:5432/medimage_db
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - MINIO1_ENDPOINT=minio1:9000
      - MINIO2_ENDPOINT=minio2:9000
      - MINIO3_ENDPOINT=minio3:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin123
      - MINIO_BUCKET=hospital-a-files
      - JWT_SECRET_KEY=hospital-a-secret-key-change-in-production
      - JWT_ALGORITHM=RS256
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - FEDERATION_GRPC_HOST=federation:50051
      - CORS_ORIGINS=http://localhost:3000,http://172.29.136.54:3000
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio1:
        condition: service_healthy
      kafka:
        condition: service_started
      federation:
        condition: service_started
    volumes:
      - ./app:/app
      - ./frontend/dist:/app/frontend/dist:ro

  # Prometheus Monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: hospital-a-prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'

  # Grafana Dashboard
  grafana:
    image: grafana/grafana:latest
    container_name: hospital-a-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana:/etc/grafana/provisioning
    depends_on:
      - prometheus

volumes:
  postgres-data:
  redis-data:
  minio1-data:
  minio2-data:
  minio3-data:
  prometheus-data:
  grafana-data:
